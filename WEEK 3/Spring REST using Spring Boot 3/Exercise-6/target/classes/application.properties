# Server port as specified in the exercise curl command
server.port=8090

# In-memory user credentials for Spring Security
# username = user, password = pwd
spring.security.user.name=user
spring.security.user.password=pwd

# JWT secret key - must be at least 256 bits (32 chars) for HS256 algorithm
# In production this would come from a vault or environment variable, never hardcoded
jwt.secret=cognizant-spring-learn-secret-key-2024

# JWT token validity in milliseconds (20 minutes = 1200000 ms)
jwt.validity=1200000

# Log levels
logging.level.org.springframework=info
logging.level.com.cognizant=debug
logging.pattern.console=%d{dd-MM-yy HH:mm:ss.SSS} %5p %-25.25logger{25} %25M %4L %m%n
