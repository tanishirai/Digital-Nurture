# -----------------------------------------------
# Spring Framework and application log levels
# -----------------------------------------------
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate SQL logging - shows actual queries executed against the DB
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern - timestamp, thread, level, logger, method, line, message
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# -----------------------------------------------
# Database configuration - MySQL
# -----------------------------------------------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=Tanumanu@1004

# -----------------------------------------------
# Hibernate configuration
# -----------------------------------------------
# validate = check if table/columns exist, throw exception if not found
# Other options: create, update, create-drop
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Show SQL in console (alternative to logging.level.org.hibernate.SQL)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
